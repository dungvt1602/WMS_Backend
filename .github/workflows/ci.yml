name: Java CI with Maven

#Kich ban chay khi nao
on:
  push:
    branches: ["main" , "developer"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest #Chay tren may ao ubuntu moi nhat

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123
          POSTGRES_DB: wms
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  #lay code tu repo ve may ao ubuntu

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven  #tu dong cache thu vien de may ao unbuntu cua github nho

      - name: Make mvnw executable
        run: chmod +x mvnw  # ĐÚNG: dùng 'run' cho câu lệnh shell

      - name: Build with Maven
        run: ./mvnw clean install




