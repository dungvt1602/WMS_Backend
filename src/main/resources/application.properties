# --- LETTUCE CONNECTION POOL CONFIGURATION ---
# Sá»‘ lÆ°á»£ng káº¿t ná»‘i tá»‘i Ä‘a cÃ³ thá»ƒ hoáº¡t Ä‘á»™ng (mÆ°á»£n tá»« pool) táº¡i má»™t thá»i Ä‘iá»ƒm
spring.data.redis.lettuce.pool.max-active=50
# Sá»‘ lÆ°á»£ng káº¿t ná»‘i tá»‘i thiá»ƒu luÃ´n Ä‘Æ°á»£c giá»¯ á»Ÿ tráº¡ng thÃ¡i ráº£nh Ä‘á»ƒ phá»¥c vá»¥ ngay láº­p tá»©c
spring.data.redis.lettuce.pool.min-idle=10
# Sá»‘ lÆ°á»£ng káº¿t ná»‘i tá»‘i Ä‘a Ä‘Æ°á»£c phÃ©p á»Ÿ tráº¡ng thÃ¡i ráº£nh trong pool
spring.data.redis.lettuce.pool.max-idle=20
# Thá»i gian tá»‘i Ä‘a (ms) mÃ  má»™t thread pháº£i chá» Ä‘á»ƒ láº¥y Ä‘Æ°á»£c káº¿t ná»‘i trÆ°á»›c khi bÃ¡o lá»—i
spring.data.redis.lettuce.pool.max-wait=3000ms
