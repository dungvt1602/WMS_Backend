spring.application.name=wms

#------------------------------------ Cấu hình DataSource (Hikari)----------------------
# Giới hạn số lượng kết nối tới DB để bảo vệ PostgreSQL không bị "nhấn chìm" bởi Virtual Threads
# Dù Virtual Thread gánh 10,000 requests, DB cũng chỉ cấp tối đa 50 room kết nối đồng thời.
#số lượng kết nối tối đa
spring.datasource.hikari.maximum-pool-size=50
#số lượng kết nối tối thiểu
spring.datasource.hikari.minimum-idle=10

spring.datasource.url=jdbc:postgresql://localhost:5432/wms
spring.datasource.username=postgres
spring.datasource.password=0188
spring.datasource.driver-class-name=org.postgresql.Driver


# Fail fast sau 3s neu pool can — tranh request queue vo han
spring.datasource.hikari.connection-timeout=3000
 
# Dong connection idle sau 10 phut
spring.datasource.hikari.idle-timeout=600000
 
# Tai tao connection sau 30 phut (tranh bi DB kill ngam)
spring.datasource.hikari.max-lifetime=1800000
 
# Log canh bao neu 1 connection bi giu qua 5 giay
# (giup phat hien @Transactional bao qua rong)
spring.datasource.hikari.leak-detection-threshold=5000
 
# Pool name — de phan biet trong metrics / logs
spring.datasource.hikari.pool-name=WMS-HikariPool
 
# Validate connection truoc khi tra ve tu pool
spring.datasource.hikari.connection-test-query=SELECT 1


#------------------------------------ Cấu hình JPA----------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# TAT open-in-view — mac dinh Spring Boot bat, se giu connection
# suot ca HTTP request lifecycle du khong can DB nua -> het pool
#Khi bật (true - mặc định): Spring sẽ giữ kết nối Database từ lúc Request bắt đầu vào Controller cho đến tận khi 
#trả xong dữ liệu cho Client (thậm chí sau khi hàm Service đã chạy xong)
#khi Tắt (false): Spring chỉ mở kết nối đúng lúc cần (ví dụ: trong hàm save(), findById()) và đóng ngay lập tức sau khi dùng xong.
#Điều này giúp giải phóng kết nối cực nhanh, khiến Pool "rảnh rỗi" gần như ngay lập tức sau khi xử lý xong.
spring.jpa.open-in-view=false
 


#------------------------------------ Cấu hình Google GenAI----------------------
spring.ai.google.genai.project-id=demo-project
spring.ai.google.genai.api-key=demo-key
spring.ai.vectorstore.google.project-id=demo-project

#------------------------------------ Docker stop----------------------
spring.docker.compose.enabled=false

#------------------------------------ Cấu hình JWT----------------------
jwt.secret=your-super-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

#------------------------------------ Cấu hình Redis----------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379
# --- LETTUCE CONNECTION POOL CONFIGURATION ---
# Số lượng kết nối tối đa có thể hoạt động (mượn từ pool) tại một thời điểm
spring.data.redis.lettuce.pool.max-active=50

# Số lượng kết nối tối thiểu luôn được giữ ở trạng thái rảnh để phục vụ ngay lập tức
spring.data.redis.lettuce.pool.min-idle=10

# Số lượng kết nối tối đa được phép ở trạng thái rảnh trong pool
spring.data.redis.lettuce.pool.max-idle=20

# Thời gian tối đa (ms) mà một thread phải chờ để lấy được kết nối trước khi báo lỗi
spring.data.redis.lettuce.pool.max-wait=3000ms

# Thời gian chờ (ms) để thiết lập kết nối socket mới
spring.data.redis.lettuce.shutdown-timeout=100ms



# ============================================================
# Logging
# ============================================================
 
logging.level.com.zaxxer.hikari=INFO
 
# Bat khi can xem pool config luc startup
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
 
# Bat khi can debug query (nen tat o prod)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.stat=DEBUG


# -----------------------------
# HIGH-CONCURRENCY (ENTERPRISE)
# -----------------------------
# Kích hoạt dũng sĩ Java 21 Virtual Threads (Loom) thay cho Standard Tomcat Threads (Mặc định 200)
spring.threads.virtual.enabled=true



# -----------------------------
# KAFKA (EVENT-DRIVEN ARCHITECTURE)
# -----------------------------
# Trỏ mũi tiêm về con Docker Kafka ở cổng 9092
spring.kafka.bootstrap-servers=localhost:9092,localhost:9093,localhost:9094
# Tên của nhóm công nhân bốc vác (Consumer Group)
spring.kafka.consumer.group-id=wms-inventory-group
# Nếu đọc rớt mạng, đọc lại từ Message cũ nhất
spring.kafka.consumer.auto-offset-reset=earliest

# Cách giải mã Key và Value (thông thường là String)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Kafka Producer Configs (Dành cho bên gửi)
# Đảm bảo tin nhắn không bị mất và được ghi nhận an toàn
spring.kafka.producer.acks=all
spring.kafka.producer.retries=10
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.min.insync.replicas=2

# Kafka Consumer Configs (Dành cho bên nhận)
spring.kafka.consumer.group-id=wms-inventory-group
spring.kafka.consumer.auto-offset-reset=earliest
# Tắt tự động commit để kiểm soát lỗi tốt hơn
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=manual_immediate