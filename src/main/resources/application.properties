# TAT open-in-view â€” mac dinh Spring Boot bat, se giu connection
# suot ca HTTP request lifecycle du khong can DB nua -> het pool
#Khi báº­t (true - máº·c Ä‘á»‹nh): Spring sáº½ giá»¯ káº¿t ná»‘i Database tá»« lÃºc Request báº¯t Ä‘áº§u vÃ o Controller cho Ä‘áº¿n táº­n khi 
#tráº£ xong dá»¯ liá»‡u cho Client (tháº­m chÃ­ sau khi hÃ m Service Ä‘Ã£ cháº¡y xong)
#khi Táº¯t (false): Spring chá»‰ má»Ÿ káº¿t ná»‘i Ä‘Ãºng lÃºc cáº§n (vÃ­ dá»¥: trong hÃ m save(), findById()) vÃ  Ä‘Ã³ng ngay láº­p tá»©c sau khi dÃ¹ng xong.
#Äiá»u nÃ y giÃºp giáº£i phÃ³ng káº¿t ná»‘i cá»±c nhanh, khiáº¿n Pool "ráº£nh rá»—i" gáº§n nhÆ° ngay láº­p tá»©c sau khi xá»­ lÃ½ xong.
spring.jpa.open-in-view=false
#------------------------------------ Cáº¥u hÃ¬nh Google GenAI----------------------
spring.ai.google.genai.project-id=demo-project
