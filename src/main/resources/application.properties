spring.application.name=wms
#------------------------------------ Cáº¥u hÃ¬nh DataSource (Hikari)----------------------
# Giá»›i háº¡n sá»‘ lÆ°á»£ng káº¿t ná»‘i tá»›i DB Ä‘á»ƒ báº£o vá»‡ PostgreSQL khÃ´ng bá»‹ "nháº¥n chÃ¬m" bá»Ÿi Virtual Threads
# DÃ¹ Virtual Thread gÃ¡nh 10,000 requests, DB cÅ©ng chá»‰ cáº¥p tá»‘i Ä‘a 50 room káº¿t ná»‘i Ä‘á»“ng thá»i.
#sá»‘ lÆ°á»£ng káº¿t ná»‘i tá»‘i Ä‘a
spring.datasource.hikari.maximum-pool-size=50
#sá»‘ lÆ°á»£ng káº¿t ná»‘i tá»‘i thiá»ƒu
spring.datasource.hikari.minimum-idle=10
