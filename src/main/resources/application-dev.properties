spring.datasource.url=jdbc:postgresql://localhost:5432/wms
spring.datasource.driver-class-name=org.postgresql.Driver

# Local dev values come from environment variables on your machine.
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.ai.google.genai.project-id=${GOOGLE_GENAI_PROJECT_ID:demo-project}
spring.ai.google.genai.api-key=${GOOGLE_GENAI_API_KEY}
spring.ai.vectorstore.google.project-id=${GOOGLE_GENAI_PROJECT_ID:demo-project}
