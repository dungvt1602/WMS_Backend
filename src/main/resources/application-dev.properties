spring.datasource.url=jdbc:postgresql://localhost:5432/wms
spring.datasource.driver-class-name=org.postgresql.Driver
spring.cloud.vault.enabled=false
# Local dev values come from environment variables on your machine.
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# JWT signing key (Base64), required for both access and refresh token flow
jwt.secret=${JWT_SECRET}
# Access token TTL (milliseconds), default 15 minutes
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
# Refresh token TTL (milliseconds), default 7 days
jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
# Backward compatibility: old key, keep during migration
jwt.expiration=${JWT_EXPIRATION:86400000}
# Login rate limit
security.rate-limit.login.max-attempts=${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
security.rate-limit.login.window-seconds=${LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
spring.ai.google.genai.project-id=${GOOGLE_GENAI_PROJECT_ID:demo-project}
spring.ai.google.genai.api-key=${GOOGLE_GENAI_API_KEY}
spring.ai.vectorstore.google.project-id=${GOOGLE_GENAI_PROJECT_ID:demo-project}
#-------------Cấu hình flyway ------------------------------
#-------------Cấu hình flyway ------------------------------
spring.flyway.enabled=true
spring.flyway.clean-disabled=true





